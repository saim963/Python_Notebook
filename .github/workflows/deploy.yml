name: Deploy JupyterLite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install JupyterLite
        run: |
          python -m pip install jupyterlite-core jupyterlite-pyodide-kernel

      - name: Build JupyterLite Static Site
        run: |
          # Build the jupyter lab environment into 'dist' folder
          # It automatically picks up jupyter-lite.json, python_notebook.ipynb, and requirements.txt
          jupyter lite build --output-dir dist

      - name: Inject Custom Landing Page
        run: |
          # Overwrite Jupyter's default index.html with our beautiful custom hero page
          cp index.html dist/index.html
          cp -r static dist/static

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
