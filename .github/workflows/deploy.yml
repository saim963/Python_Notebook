name: Deploy JupyterLite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite
        run: |
          python -m pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter_server

      - name: Prepare notebook contents
        run: |
          mkdir -p contents
          cp python_notebook.ipynb contents/

      - name: Build JupyterLite Static Site
        run: |
          jupyter lite build --output-dir dist --contents contents

      - name: Inject Custom Landing Page
        run: |
          cp -f index.html dist/index.html
          mkdir -p dist/assets
          cp -f assets/* dist/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
